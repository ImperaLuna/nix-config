# Hyprland baseline configuration.
# Shells can add UI on top, but core navigation and app shortcuts live here.

$terminal = ghostty
$browser = zen-beta
$dropcaps = /run/current-system/sw/bin/setpriv --ambient-caps=-all --inh-caps=-all
$screenshot_dir = $HOME/Pictures/Screenshots

# ==================
# MONITORS
# ==================
# Static layout from the previous generated display config.
monitor = DP-1, 2560x1440@144.000, 1920x0, 1, vrr, 0
monitor = DP-2, 1920x1080@120.000, 4480x0, 1, vrr, 0

# Fallback for any newly attached display.
monitor = , preferred, auto, 1

# ==================
# STARTUP
# ==================
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target
exec-once = nova

# Notification tray apps
exec-once = $dropcaps discord --start-minimized
exec-once = $dropcaps /run/current-system/sw/bin/env ELECTRON_OZONE_PLATFORM_HINT=x11 ferdium

# ==================
# INPUT
# ==================
input {
    kb_layout = us
    numlock_by_default = true
}

# ==================
# LOOK AND LAYOUT
# ==================
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    layout = dwindle

    col.active_border = rgba(adc6ffff)
    col.inactive_border = rgba(1d2026ff)

    snap {
        enabled = true
        window_gap = 10
        monitor_gap = 10
    }
}

decoration {
    rounding = 14
    active_opacity = 0.96
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        offset = 0 2
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        ignore_opacity = true
        new_optimizations = true
        xray = true
    }
}

animations {
    enabled = true
    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = windowsMove, 1, 4, default
    animation = workspaces, 1, 5, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = true
}

# ==================
# SHELL INTEGRATION
# ==================
layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = blur on, match:namespace ^(quickshell)$

# ==================
# WINDOW RULES
# ==================
windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# ==================
# CORE APPLICATIONS
# ==================
bind = SUPER, T, exec, $dropcaps $terminal
bind = SUPER, B, exec, $dropcaps $browser

# Nova provides the shell UI while Hyprland owns window management.
bindr = SUPER, Space, exec, nova launcher
bind = SUPER, D, exec, nova launcher
bind = SUPER, V, exec, nova history
bind = SUPER, N, exec, nova notes

# ==================
# WINDOW MANAGEMENT
# ==================
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, T, togglefloating
bind = SUPER, W, togglegroup

bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

bind = SUPER CTRL, left, focusmonitor, l
bind = SUPER CTRL, right, focusmonitor, r
bind = SUPER CTRL, H, focusmonitor, l
bind = SUPER CTRL, J, focusmonitor, d
bind = SUPER CTRL, K, focusmonitor, u
bind = SUPER CTRL, L, focusmonitor, r

bind = SUPER SHIFT CTRL, left, movewindow, mon:l
bind = SUPER SHIFT CTRL, down, movewindow, mon:d
bind = SUPER SHIFT CTRL, up, movewindow, mon:u
bind = SUPER SHIFT CTRL, right, movewindow, mon:r
bind = SUPER SHIFT CTRL, H, movewindow, mon:l
bind = SUPER SHIFT CTRL, J, movewindow, mon:d
bind = SUPER SHIFT CTRL, K, movewindow, mon:u
bind = SUPER SHIFT CTRL, L, movewindow, mon:r

bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

binde = SUPER, minus, resizeactive, -10% 0
binde = SUPER, equal, resizeactive, 10% 0
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER SHIFT, equal, resizeactive, 0 10%

# ==================
# WORKSPACES
# ==================
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, grave, movetoworkspace, special:magic
bind = SUPER ALT, grave, movetoworkspacesilent, special:magic

bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, Page_Up, workspace, e-1
bind = SUPER, U, workspace, e+1
bind = SUPER, I, workspace, e-1

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER CTRL, mouse_down, movetoworkspace, e+1
bind = SUPER CTRL, mouse_up, movetoworkspace, e-1

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# ==================
# MEDIA, SCREEN, POWER
# ==================
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = , Print, exec, nova screenshot
bind = CTRL, Print, exec, mkdir -p "$screenshot_dir" && grim "$screenshot_dir/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png"
bind = SUPER SHIFT, S, exec, nova screenshot

bind = SUPER ALT, L, exec, qylock-lock
bind = SUPER SHIFT, E, exit
bind = SUPER SHIFT, P, dpms, toggle
