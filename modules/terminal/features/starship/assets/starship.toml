[time]
disabled = false
time_format = "%R"
style = "bg:dark"
format = '[[ ’É║ $time ](fg:white bg:dark)]($style)'

# line_break must stay enabled to fix a WezTerm + fish cursor offset bug:
# Nerd Font powerline glyphs have ambiguous display widths that fish and WezTerm
# calculate differently, causing the cursor to appear 1 column ahead and ghost
# characters on deletion. Putting ŌØ» on its own line means fish has nothing to
# miscount. Alternative fix: set `fish_ambiguous_width 1` in fish interactiveShellInit
# to align fish's width calculation with WezTerm's unicode_version setting.
[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:orange)'
error_symbol = '[ŌØ»](bold fg:purple)'
vimcmd_symbol = '[ŌØ«](bold fg:orange)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:pink)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:pink)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:purple)'

[cmd_duration]
show_milliseconds = true
format = "[Ņ½┤ in $duration ](fg:white bg:dark)"
style = "bg:dark"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.colors]
orange = "#FD7014"
cream  = "#F5E7C6"
secondary   = "#be95ff"
purple = "#412B6B"
dark   = "#222831"
white  = "#EEEEEE"
black  = "#11111b"
pink   = "#ff7eb6"
red  = "#D62828"
