[golang]
symbol = "Ņś¦"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[php]
symbol = "Ņśł"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[kotlin]
