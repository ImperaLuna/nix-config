truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:secondary"
format = '[[ $symbol $branch ](fg:black bg:secondary)]($style)'

[git_status]
style = "bg:secondary"
format = '[[($all_status$ahead_behind )](fg:black bg:secondary)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[c]
symbol = "Ņś× "
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:purple"
