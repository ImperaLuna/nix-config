"$schema" = 'https://starship.rs/config-schema.json'

format = """
[Óā∂](orange)\
$os\
$username\
[Óāį](bg:cream fg:orange)\
$directory\
[Óāį](bg:teal fg:cream)\
$git_branch\
$git_status\
[Óāį](fg:teal bg:purple)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Óāį](fg:purple bg:dark)\
$time\
$cmd_duration\
[Óāī ](fg:dark)\
$line_break\
$character"""

palette = 'colors'

[os]
disabled = false
style = "bg:orange fg:black"
format = '[$symbol]($style)'

[os.symbols]
Windows = "ÓúŹ"
Ubuntu = "ůįēą"
SUSE = "ÔĆĒ"
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "ůįÄĶ"
Manjaro = "ÔĆí"
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = "ÔĆÄ"
Amazon = "ÔČį"
Android = "Óúé"
AOSC = "ÔĆĀ"
Arch = "ůį£á"
Artix = "ůį£á"
CentOS = "ÔĆĄ"
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"

[username]
show_always = true
style_user = "bg:orange fg:black"
style_root = "bg:orange fg:black"
format = '[$user ]($style)'

[directory]
style = "bg:cream fg:black"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:teal"
format = '[[ $symbol $branch ](fg:black bg:teal)]($style)'

[git_status]
style = "bg:teal"
format = '[[($all_status$ahead_behind )](fg:black bg:teal)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[c]
symbol = "Óėě "
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[rust]
symbol = "Óě®"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[golang]
symbol = "Óėß"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[php]
symbol = "Óėą"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[java]
symbol = "ÓČĖ "
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[haskell]
symbol = "Óėü"
style = "bg:purple"
format = '[[ $symbol( $version) ](fg:white bg:purple)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:purple"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:white bg:purple)]($style)'

[docker_context]
symbol = "ÔĆą"
style = "bg:dark"
format = '[[ $symbol( $context) ](fg:white bg:dark)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:dark"
format = '[[ Ôźļ $time ](fg:white bg:dark)]($style)'

# line_break must stay enabled to fix a WezTerm + fish cursor offset bug:
# Nerd Font powerline glyphs have ambiguous display widths that fish and WezTerm
# calculate differently, causing the cursor to appear 1 column ahead and ghost
# characters on deletion. Putting ‚ĚĮ on its own line means fish has nothing to
# miscount. Alternative fix: set `fish_ambiguous_width 1` in fish interactiveShellInit
# to align fish's width calculation with WezTerm's unicode_version setting.
[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:orange)'
error_symbol = '[‚ĚĮ](bold fg:purple)'
vimcmd_symbol = '[‚Ěģ](bold fg:orange)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:pink)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:pink)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:purple)'

[cmd_duration]
show_milliseconds = true
format = "[Óęī in $duration ](fg:white bg:dark)"
style = "bg:dark"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.colors]
orange = "#FD7014"
cream  = "#F5E7C6"
teal   = "#00ADB5"
purple = "#412B6B"
dark   = "#222831"
white  = "#EEEEEE"
black  = "#11111b"
pink   = "#ff7eb6"
red  = "#D62828"
