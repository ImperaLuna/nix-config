# line_break must stay enabled to fix a WezTerm + fish cursor offset bug:
# Nerd Font powerline glyphs have ambiguous display widths that fish and WezTerm
# calculate differently, causing the cursor to appear 1 column ahead and ghost
# characters on deletion. Putting ÔØ» on its own line means fish has nothing to
# miscount. Alternative fix: set `fish_ambiguous_width 1` in fish interactiveShellInit
# to align fish's width calculation with WezTerm's unicode_version setting.
[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:orange)'
error_symbol = '[ÔØ»](bold fg:purple)'
vimcmd_symbol = '[ÔØ«](bold fg:orange)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:red)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:red)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:purple)'

[cmd_duration]
show_milliseconds = true
format = "[¯½┤ in $duration ](fg:white bg:dark)"
style = "bg:dark"
disabled = false
show_notifications = true
min_time_to_notify = 45000

